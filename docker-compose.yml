services:
    # Servicio de la aplicación Laravel
    app:
        build:
            context: .
            dockerfile: Dockerfile
        image: essalud-am-app
        container_name: essalud-app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./:/var/www
            - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
        networks:
            - essalud-network
        depends_on:
            - db

    # Servicio de base de datos MySQL
    db:
        image: mysql:8.0
        container_name: essalud-db
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DB_DATABASE:-adulto_mayor}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
            SERVICE_TAGS: dev
            SERVICE_NAME: mysql
        volumes:
            - dbdata:/var/lib/mysql
            - ./docker/mysql/my.cnf:/etc/mysql/my.cnf
        ports:
            - "3307:3306"
        networks:
            - essalud-network

    # Servicio Nginx
    nginx:
        image: nginx:alpine
        container_name: essalud-nginx
        restart: unless-stopped
        ports:
            - "8080:80"
            - "8443:443"
        volumes:
            - ./:/var/www
            - ./docker/nginx/conf.d:/etc/nginx/conf.d
        networks:
            - essalud-network
        depends_on:
            - app

    # Servicio Node.js para Vite
    node:
        image: node:20-alpine
        container_name: essalud-node
        working_dir: /var/www
        volumes:
            - ./:/var/www
        ports:
            - "5173:5173"
        command: sh -c "npm install && npm run dev -- --host"
        networks:
            - essalud-network

networks:
    essalud-network:
        driver: bridge

volumes:
    dbdata:
        driver: local
